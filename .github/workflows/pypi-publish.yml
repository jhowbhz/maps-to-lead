name: Publicar SDK no PyPI

# Publica o pacote maps-to-lead (pasta sdk-python/) no PyPI via Trusted
# Publishing (OIDC):
#   - push de tag `py-vX.Y.Z` -> publica a versão do sdk-python/pyproject.toml
#   - execução manual          -> pela aba Actions (workflow_dispatch)
#
# Não usa senha nem PYPI_TOKEN: a confiança é estabelecida no pypi.org
# (Trusted Publisher), apontando para este repositório, este arquivo de workflow
# e o environment `pypi`. O upload troca o token OIDC do GitHub automaticamente.
on:
  push:
    tags:
      - "py-v*.*.*"
  workflow_dispatch:

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # necessário para o OIDC do Trusted Publishing do PyPI
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build (wheel + sdist)
        working-directory: sdk-python
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk-python/dist
