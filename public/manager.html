<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>maps-to-lead · painel</title>
<style>
  /* ---- Tema: console de operacoes, dark commitment ---------------------- */
  :root{
    --bg:#0d1117; --surface:#161b22; --surface-2:#1c232c; --line:#293240;
    --line-soft:#21262d;
    --ink:#e6edf3; --ink-2:#adbac7; --ink-3:#8b949e; --ink-4:#6e7681;
    --accent:#2dd4bf;                 /* teal: ao vivo / medidor principal */
    /* Tiers do score (A melhor -> D pior). Paleta validada p/ CVD no dark. */
    --tier-a:#3fb950; --tier-b:#58a6ff; --tier-c:#e3b341; --tier-d:#ff5c5c;
    --good:#3fb950; --warn:#e3b341; --bad:#ff5c5c; --info:#58a6ff;
    --radius:12px;
    --mono:ui-monospace,"SF Mono","Cascadia Mono","JetBrains Mono",Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(900px 500px at 88% -8%, rgba(45,212,191,.07), transparent 60%),
      radial-gradient(700px 500px at 0% 0%, rgba(88,166,255,.06), transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    font-size:14px; line-height:1.45; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--info);text-decoration:none}
  a:hover{text-decoration:underline}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .hidden{display:none !important}

  /* ---- Login ------------------------------------------------------------- */
  .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{
    width:min(400px,100%);background:var(--surface);
    border:1px solid var(--line-soft);border-radius:16px;padding:30px 28px;
    box-shadow:0 24px 60px rgba(0,0,0,.45);
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(45,212,191,.18)}
  .login-card h1{font-size:19px;margin:18px 0 4px}
  .login-card p{color:var(--ink-3);margin:0 0 20px;font-size:13px}
  label{display:block;font-size:12px;color:var(--ink-3);margin:0 0 7px;text-transform:uppercase;letter-spacing:.6px}
  input[type=password],input[type=text]{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);padding:12px 13px;font-family:var(--mono);font-size:14px;outline:none;
  }
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,212,191,.15)}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
    margin-top:16px;background:var(--accent);color:#03211d;border:none;border-radius:10px;
    padding:12px 16px;font-weight:700;font-size:14px;cursor:pointer;font-family:var(--sans);
  }
  .btn:hover{filter:brightness(1.07)}
  .btn.secondary{width:auto;background:transparent;color:var(--ink-2);border:1px solid var(--line);padding:7px 12px;font-weight:600;font-size:12.5px;margin:0}
  .btn.secondary:hover{border-color:var(--ink-3);filter:none}
  .err{color:var(--bad);font-size:12.5px;margin-top:12px;min-height:16px}

  /* ---- Layout ------------------------------------------------------------ */
  .topbar{
    position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:16px;
    padding:14px 22px;background:rgba(13,17,23,.82);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line-soft);
  }
  .topbar .spacer{flex:1}
  .status{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);font-family:var(--mono)}
  .status .dot{width:9px;height:9px;border-radius:50%;background:var(--ink-4)}
  .status.live .dot{background:var(--accent);animation:pulse 1.8s infinite}
  .status.live{color:var(--accent)}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(45,212,191,.5)}70%{box-shadow:0 0 0 7px rgba(45,212,191,0)}100%{box-shadow:0 0 0 0 rgba(45,212,191,0)}}
  main{padding:22px;max-width:1320px;margin:0 auto}
  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-4);margin:26px 2px 12px;font-weight:700}
  .section-title:first-child{margin-top:6px}

  /* ---- KPI tiles --------------------------------------------------------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.9}
  .kpi.k-phone::before{background:var(--accent)}
  .kpi.k-wa::before{background:var(--good)}
  .kpi.k-score::before{background:var(--tier-b)}
  .kpi.k-lat::before{background:var(--warn)}
  .kpi.k-err::before{background:var(--bad)}
  .kpi .label{font-size:11.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.5px}
  .kpi .val{font-family:var(--mono);font-size:27px;font-weight:600;margin-top:6px;letter-spacing:-.5px}
  .kpi .val small{font-size:14px;color:var(--ink-3);font-weight:500}
  .kpi .sub{font-size:11.5px;color:var(--ink-4);margin-top:2px}

  /* ---- Job cards --------------------------------------------------------- */
  .jobs{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:14px}
  .job{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px 17px}
  .job-head{display:flex;align-items:flex-start;gap:10px}
  .job-q{font-weight:700;font-size:15px;line-height:1.3;word-break:break-word;flex:1}
  .job-sub{color:var(--ink-4);font-size:11.5px;margin-top:3px;font-family:var(--mono)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;letter-spacing:.3px;border:1px solid transparent}
  .badge.scraping{color:var(--info);background:rgba(88,166,255,.12);border-color:rgba(88,166,255,.3)}
  .badge.parsing{color:var(--accent);background:rgba(45,212,191,.12);border-color:rgba(45,212,191,.3)}
  .badge.done{color:var(--good);background:rgba(63,185,80,.12);border-color:rgba(63,185,80,.3)}
  .badge.error{color:var(--bad);background:rgba(255,92,92,.12);border-color:rgba(255,92,92,.3)}
  .chip{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--ink-3);border:1px solid var(--line-soft)}

  .meter{height:9px;background:var(--surface-2);border-radius:999px;overflow:hidden;margin:13px 0 6px;border:1px solid var(--line-soft)}
  .meter > i{display:block;height:100%;border-radius:999px;background:var(--accent);transition:width .5s ease}
  .meter-info{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-3);font-family:var(--mono)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
  .stat{background:var(--bg);border:1px solid var(--line-soft);border-radius:9px;padding:8px 10px}
  .stat .s-label{font-size:10.5px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.4px}
  .stat .s-val{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:3px}
  .stat .s-val.good{color:var(--good)} .stat .s-val.warn{color:var(--warn)} .stat .s-val.bad{color:var(--bad)}

  /* distribuicao de score por tier (barra empilhada com folga de 2px) */
  .score-row{display:flex;align-items:center;gap:14px;margin-top:15px;padding-top:14px;border-top:1px solid var(--line-soft)}
  .score-big{text-align:center;flex-shrink:0}
  .score-big .n{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
  .score-big .t{font-size:10.5px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .tierbar-wrap{flex:1;min-width:0}
  .tierbar{display:flex;gap:2px;height:12px;border-radius:6px;overflow:hidden;background:var(--surface-2)}
  .tierbar > span{display:block;height:100%;min-width:0}
  .tier-a{background:var(--tier-a)} .tier-b{background:var(--tier-b)} .tier-c{background:var(--tier-c)} .tier-d{background:var(--tier-d)}
  .tier-legend{display:flex;flex-wrap:wrap;gap:11px;margin-top:9px;font-size:11px;color:var(--ink-3);font-family:var(--mono)}
  .tier-legend b{display:inline-flex;align-items:center;gap:5px;font-weight:500;color:var(--ink-2)}
  .tier-legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

  /* ---- Feed de leads ----------------------------------------------------- */
  .table-wrap{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-4);
     font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
  td{padding:10px 14px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--surface-2)}
  .lead-name{font-weight:600;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mono{font-family:var(--mono)}
  .wa{color:var(--good);font-weight:700;font-size:11px}
  .no{color:var(--ink-4)}
  /* chip de score: cor = tier, texto (letra+numero) = encoding redundante */
  .score-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-weight:700;font-size:12px;
    padding:3px 9px;border-radius:7px;border:1px solid;min-width:58px;justify-content:center}
  .sc-a{color:var(--tier-a);border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.1)}
  .sc-b{color:var(--tier-b);border-color:rgba(88,166,255,.4);background:rgba(88,166,255,.1)}
  .sc-c{color:var(--tier-c);border-color:rgba(227,179,65,.4);background:rgba(227,179,65,.1)}
  .sc-d{color:var(--tier-d);border-color:rgba(255,92,92,.4);background:rgba(255,92,92,.1)}
  .empty{padding:40px;text-align:center;color:var(--ink-4);font-size:13px}
  .foot{color:var(--ink-4);font-size:11.5px;text-align:center;margin:26px 0 8px;font-family:var(--mono)}

  /* ---- Abas (Processos | Leads) ----------------------------------------- */
  .tabs{display:flex;gap:4px;margin:26px 0 14px;border-bottom:1px solid var(--line-soft)}
  .tab{appearance:none;background:none;border:none;color:var(--ink-3);font-family:var(--sans);font-size:13.5px;
    font-weight:600;padding:9px 14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
    display:inline-flex;align-items:center;gap:7px}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--ink);border-bottom-color:var(--accent)}
  .tab-count{font-family:var(--mono);font-size:11px;color:var(--ink-4);background:var(--surface-2);
    border:1px solid var(--line-soft);border-radius:999px;padding:1px 7px}
  .tab.active .tab-count{color:var(--accent)}
  .pager{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin:14px 2px;
    font-family:var(--mono);font-size:12.5px;color:var(--ink-3)}
  .pager button{appearance:none;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);
    border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans);font-size:13px}
  .pager button:hover:not(:disabled){border-color:var(--accent);color:var(--ink)}
  .pager button:disabled{opacity:.4;cursor:not-allowed}
  .leads-toolbar{display:flex;justify-content:flex-end;margin:0 2px 12px}
</style>
</head>
<body>

<!-- ================= LOGIN (token apenas) ================= -->
<div id="login" class="login-wrap">
  <form class="login-card" id="loginForm" autocomplete="off">
    <div class="brand"><span class="dot"></span> maps-to-lead</div>
    <h1>Área do manager</h1>
    <p>Acesso por token. Cole o <b>MANAGER_TOKEN</b> configurado no servidor.</p>
    <label for="token">Token de acesso</label>
    <input id="token" type="password" placeholder="••••••••••••••••" autocomplete="off" spellcheck="false">
    <button class="btn" type="submit">Entrar no painel</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dash" class="hidden">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> maps-to-lead <span style="color:var(--ink-4);font-weight:500">· painel ao vivo</span></div>
    <div class="spacer"></div>
    <div class="status" id="conn"><span class="dot"></span> <span id="connTxt">conectando…</span></div>
    <div class="status"><span id="uptime" class="num">—</span></div>
    <button class="btn secondary" id="logout">Sair</button>
  </div>

  <main>
    <div class="section-title">Visão geral</div>
    <div class="kpis" id="kpis"></div>

    <div class="tabs" id="tabs">
      <button type="button" class="tab active" data-tab="jobs">Processos <span class="tab-count" id="tabCountJobs">0</span></button>
      <button type="button" class="tab" data-tab="leads">Leads <span class="tab-count" id="tabCountLeads">0</span></button>
    </div>

    <div id="panel-jobs">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Processo</th><th>Status</th><th>Progresso</th><th>Telefone</th><th>WhatsApp</th><th>Site</th>
            <th>Enviados</th><th>Erros</th><th>Score</th><th>A/B/C/D</th><th>Fase 1</th><th>Latência</th><th>Tempo</th>
          </tr></thead>
          <tbody id="jobs"></tbody>
        </table>
      </div>
      <div class="pager" id="jobsPager"></div>
    </div>

    <div id="panel-leads" class="hidden">
      <div class="leads-toolbar">
        <button type="button" class="btn secondary" id="downloadXlsx">⬇ Baixar XLSX</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Score</th><th>Nome</th><th>Telefone</th><th>WhatsApp</th><th>Site</th><th>Nota</th><th>Latência</th><th>Quando</th>
          </tr></thead>
          <tbody id="leads"></tbody>
        </table>
      </div>
      <div class="pager" id="pager"></div>
    </div>

    <div class="foot" id="foot"></div>
  </main>
</div>

<script>
(function(){
  "use strict";
  var TOKEN_KEY = "mgr_token";
  var es = null, token = localStorage.getItem(TOKEN_KEY) || "";

  // ---- helpers ----------------------------------------------------------
  function $(id){ return document.getElementById(id); }
  function esc(s){ var d=document.createElement("div"); d.textContent = (s==null?"":String(s)); return d.innerHTML; }
  function n(x){ return (x==null?0:x).toLocaleString("pt-BR"); }
  function ms(v){
    if(v==null) return "—";
    if(v<1000) return v+" ms";
    if(v<60000) return (v/1000).toFixed(v<10000?1:0)+" s";
    var m=Math.floor(v/60000), s=Math.round((v%60000)/1000); return m+"m "+(s<10?"0":"")+s+"s";
  }
  function pct(x){ return (x==null?0:x)+"%"; }
  function tierClass(t){ return "sc-"+String(t||"d").toLowerCase(); }
  function whenStr(at){ if(!at) return "—"; try{ return new Date(at).toLocaleTimeString("pt-BR"); }catch(e){ return "—"; } }

  // ---- auth / boot ------------------------------------------------------
  function showLogin(msg){
    if(es){ es.close(); es=null; }
    $("dash").classList.add("hidden");
    $("login").classList.remove("hidden");
    $("loginErr").textContent = msg || "";
    $("token").focus();
  }
  function showDash(){
    $("login").classList.add("hidden");
    $("dash").classList.remove("hidden");
  }

  // Valida o token batendo no snapshot (usa header). 200 = ok.
  function validate(tk){
    return fetch("/manager/api/state", { headers: { "Authorization": "Bearer "+tk } })
      .then(function(r){
        if(r.status===200) return r.json();
        if(r.status===401) throw new Error("Token inválido.");
        if(r.status===503) throw new Error("MANAGER_TOKEN não configurado no servidor (.env).");
        throw new Error("Erro "+r.status+".");
      });
  }

  function connect(tk){
    token = tk;
    localStorage.setItem(TOKEN_KEY, tk);
    showDash();
    leadsPage = 0; loadLeads();   // popula o contador/tabela de leads (SQLite)
    if(es) es.close();
    // EventSource nao envia headers -> token vai na querystring.
    es = new EventSource("/manager/stream?token="+encodeURIComponent(tk));
    es.onmessage = function(ev){
      try{ render(JSON.parse(ev.data)); setConn(true); }catch(e){}
    };
    es.onopen = function(){ setConn(true); };
    es.onerror = function(){ setConn(false); };  // EventSource reconecta sozinho
  }

  function setConn(live){
    var c=$("conn");
    c.className = "status"+(live?" live":"");
    $("connTxt").textContent = live ? "ao vivo" : "reconectando…";
  }

  // ---- render -----------------------------------------------------------
  function kpi(cls,label,val,sub){
    return '<div class="kpi '+cls+'"><div class="label">'+label+'</div>'+
           '<div class="val">'+val+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
  }

  function render(s){
    var t = s.totals || {};
    $("uptime").textContent = "uptime "+ms(s.uptimeMs);

    // KPIs
    $("kpis").innerHTML =
      kpi("k-jobs","Jobs ativos", '<span class="num">'+n(t.activeJobs)+'</span>', n(t.jobs)+" no total") +
      kpi("k-leads","Leads processados", '<span class="num">'+n(t.leads)+'</span>', n(t.sent)+" enviados") +
      kpi("k-phone","Com telefone", '<span class="num">'+pct(t.pctWithPhone)+'</span>', n(t.withPhone)+" leads") +
      kpi("k-wa","Com WhatsApp", '<span class="num">'+pct(t.pctWithWhatsapp)+'</span>', n(t.withWhatsapp)+" celulares") +
      kpi("k-lat","Latência média", '<span class="num">'+avgLat(s)+'</span>', "por lead") +
      kpi("k-score","Score médio", '<span class="num">'+n(t.avgScore)+'</span><small>/100</small>', "qualidade") +
      kpi("k-err","Sem telefone / erros", '<span class="num">'+n(t.withoutPhone)+'</span>', n(t.errors)+" erros · "+n(t.skipped)+" pulados");

    // Jobs (paginados client-side, 12 por página)
    var jobs = s.jobs || [];
    lastJobs = jobs;
    renderJobs();

    // Contadores das abas
    $("tabCountJobs").textContent = n(jobs.length);
    $("tabCountLeads").textContent = n(leadsTotal || t.leads);

    // Se a aba Leads estiver aberta, mantém a página atual atualizada.
    if(activeTab==="leads") loadLeads();

    $("foot").textContent = "atualizado "+new Date(s.now).toLocaleTimeString("pt-BR")+" · jobs e leads persistidos em SQLite";
  }

  // ---- abas + paginação de leads (SQLite) -------------------------------
  var activeTab = "jobs";
  var leadsPage = 0, leadsPageSize = 12, leadsTotal = 0;

  function switchTab(tab){
    activeTab = tab;
    var tabs = document.querySelectorAll(".tab");
    for(var i=0;i<tabs.length;i++){ tabs[i].classList.toggle("active", tabs[i].getAttribute("data-tab")===tab); }
    $("panel-jobs").classList.toggle("hidden", tab!=="jobs");
    $("panel-leads").classList.toggle("hidden", tab!=="leads");
    if(tab==="leads") loadLeads();
  }

  function authGet(url){
    return fetch(url, { headers: { "Authorization": "Bearer "+token } })
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); });
  }

  function loadLeads(){
    var offset = leadsPage*leadsPageSize;
    return authGet("/manager/api/leads?limit="+leadsPageSize+"&offset="+offset).then(function(res){
      leadsTotal = res.total || 0;
      var rows = res.leads || [];
      // Página ficou vazia (ex.: primeira carga sem dados) -> volta pra última válida.
      if(rows.length===0 && leadsPage>0){ leadsPage = Math.max(0, Math.ceil(leadsTotal/leadsPageSize)-1); return loadLeads(); }
      $("leads").innerHTML = rows.length ? rows.map(leadRow).join("") :
        '<tr><td colspan="8" class="empty">Nenhum lead ainda. Dispare um POST em /api/find.</td></tr>';
      $("tabCountLeads").textContent = n(leadsTotal);
      renderPager();
    }).catch(function(){ /* silencioso: mantém a página atual */ });
  }

  function renderPager(){
    var pages = Math.max(1, Math.ceil(leadsTotal/leadsPageSize));
    if(leadsPage > pages-1) leadsPage = pages-1;
    var cur = leadsPage+1;
    $("pager").innerHTML =
      '<span>'+n(leadsTotal)+' leads · página '+cur+' de '+pages+'</span>'+
      '<button type="button" id="prevPage"'+(leadsPage<=0?' disabled':'')+'>‹ anterior</button>'+
      '<button type="button" id="nextPage"'+(cur>=pages?' disabled':'')+'>próxima ›</button>';
    var prev=$("prevPage"), next=$("nextPage");
    if(prev) prev.onclick=function(){ if(leadsPage>0){ leadsPage--; loadLeads(); } };
    if(next) next.onclick=function(){ if((leadsPage+1)*leadsPageSize<leadsTotal){ leadsPage++; loadLeads(); } };
  }

  // ---- paginação dos processos (client-side, 12 por página) -------------
  var jobsPage = 0, jobsPageSize = 12, lastJobs = [];

  function renderJobs(){
    var total = lastJobs.length;
    var pages = Math.max(1, Math.ceil(total/jobsPageSize));
    if(jobsPage > pages-1) jobsPage = pages-1;
    if(jobsPage < 0) jobsPage = 0;
    var start = jobsPage*jobsPageSize;
    var slice = lastJobs.slice(start, start+jobsPageSize);
    $("jobs").innerHTML = slice.length ? slice.map(jobRow).join("") :
      '<tr><td colspan="13" class="empty">Nenhum processo ainda. Dispare um POST em /api/find para ver aqui em tempo real.</td></tr>';
    renderJobsPager(total, pages);
  }

  function renderJobsPager(total, pages){
    if(total <= jobsPageSize){ $("jobsPager").innerHTML = ""; return; }
    var cur = jobsPage+1;
    $("jobsPager").innerHTML =
      '<span>'+n(total)+' processos · página '+cur+' de '+pages+'</span>'+
      '<button type="button" id="prevJobs"'+(jobsPage<=0?' disabled':'')+'>‹ anterior</button>'+
      '<button type="button" id="nextJobs"'+(cur>=pages?' disabled':'')+'>próxima ›</button>';
    var prev=$("prevJobs"), next=$("nextJobs");
    if(prev) prev.onclick=function(){ if(jobsPage>0){ jobsPage--; renderJobs(); } };
    if(next) next.onclick=function(){ if(jobsPage<pages-1){ jobsPage++; renderJobs(); } };
  }

  function avgLat(s){
    // media global simples ponderada pelos jobs com latencia medida
    var tot=0,cnt=0;
    (s.jobs||[]).forEach(function(j){ if(j.latency&&j.latency.count){ tot+=j.latency.totalMs; cnt+=j.latency.count; } });
    return cnt ? ms(Math.round(tot/cnt)) : "—";
  }

  function jobRow(j){
    var c=j.counters||{}, L=j.latency||{}, sc=j.score||{tiers:{}}, ti=sc.tiers||{};
    var found = j.totalFound||j.requested||0;
    var avgTier = sc.avg>=80?'A':sc.avg>=60?'B':sc.avg>=40?'C':'D';
    var sub = j.error ? '<span style="color:var(--bad)">'+esc(j.error)+'</span>'
                      : n(found)+'/'+n(j.requested)+(j.onlyWithPhone?' · só tel':'');
    return ''+
    '<tr>'+
      '<td class="lead-name" title="'+esc(j.query)+'"><div style="font-weight:600">'+esc(j.query||"—")+'</div>'+
        '<div class="no" style="font-size:11px">'+sub+'</div></td>'+
      '<td><span class="badge '+esc(j.status)+'">'+statusLabel(j.status)+'</span></td>'+
      '<td style="min-width:132px"><div class="meter" style="margin:0 0 4px"><i style="width:'+(j.progress||0)+'%"></i></div>'+
        '<div class="no mono" style="font-size:11px">'+n(c.processed)+'/'+n(found)+' · '+(j.progress||0)+'%</div></td>'+
      '<td class="mono good">'+n(c.withPhone)+'</td>'+
      '<td class="mono good">'+n(c.withWhatsapp)+'</td>'+
      '<td class="mono">'+n(c.withWebsite)+'</td>'+
      '<td class="mono">'+n(c.sent)+'</td>'+
      '<td class="mono">'+(c.errors?'<span style="color:var(--bad)">'+n(c.errors)+'</span>':'0')+'</td>'+
      '<td><span class="score-chip '+tierClass(avgTier)+'">'+avgTier+' · '+n(sc.avg||0)+'</span></td>'+
      '<td class="mono no" style="font-size:11.5px">'+n(ti.A||0)+'/'+n(ti.B||0)+'/'+n(ti.C||0)+'/'+n(ti.D||0)+'</td>'+
      '<td class="mono">'+ms(j.phase1Ms)+'</td>'+
      '<td class="mono '+latClass(L.avgMs)+'">'+ms(L.avgMs)+'</td>'+
      '<td class="mono">'+ms(j.elapsedMs)+'</td>'+
    '</tr>';
  }
  function latClass(v){ if(v==null) return ""; if(v>=8000) return "bad"; if(v>=4000) return "warn"; return "good"; }
  function statusLabel(st){
    return st==="scraping"?"Fase 1 · buscando":
           st==="parsing" ?"Fase 2 · extraindo":
           st==="done"    ?"concluído":
           st==="error"   ?"erro":st;
  }

  function leadRow(l){
    var t = String(l.tier||"D");
    var site = l.website ? '<a href="'+esc(l.website)+'" target="_blank" rel="noopener">abrir</a>' : '<span class="no">—</span>';
    var rating = l.rating ? esc(l.rating)+(l.reviews?' <span class="no">('+esc(l.reviews)+')</span>':'') : '<span class="no">—</span>';
    return ''+
    '<tr>'+
      '<td><span class="score-chip '+tierClass(t)+'">'+esc(t)+' · '+n(l.score)+'</span></td>'+
      '<td class="lead-name" title="'+esc(l.name)+'">'+esc(l.name||"—")+'</td>'+
      '<td class="mono">'+(l.phone?esc(l.phone):'<span class="no">sem telefone</span>')+'</td>'+
      '<td>'+(l.whatsapp?'<span class="wa">● WhatsApp</span>':'<span class="no">—</span>')+'</td>'+
      '<td>'+site+'</td>'+
      '<td class="mono">'+rating+'</td>'+
      '<td class="mono">'+ms(l.ms)+'</td>'+
      '<td class="mono no">'+whenStr(l.at)+'</td>'+
    '</tr>';
  }

  // ---- eventos ----------------------------------------------------------
  $("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    var tk = $("token").value.trim();
    if(!tk){ $("loginErr").textContent="Informe o token."; return; }
    $("loginErr").textContent="Validando…";
    validate(tk).then(function(){ connect(tk); }).catch(function(err){ showLogin(err.message); });
  });
  $("logout").addEventListener("click", function(){
    localStorage.removeItem(TOKEN_KEY); token="";
    showLogin("");
  });
  (function(){
    var tabEls = document.querySelectorAll(".tab");
    for(var i=0;i<tabEls.length;i++){
      tabEls[i].addEventListener("click", function(){ switchTab(this.getAttribute("data-tab")); });
    }
  })();
  $("downloadXlsx").addEventListener("click", function(){
    var btn=this, old=btn.textContent; btn.disabled=true; btn.textContent="Gerando…";
    fetch("/manager/api/leads.xlsx", { headers: { "Authorization": "Bearer "+token } })
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.blob(); })
      .then(function(blob){
        var url=URL.createObjectURL(blob), a=document.createElement("a");
        a.href=url; a.download="leads.xlsx"; document.body.appendChild(a); a.click();
        a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      })
      .catch(function(){ alert("Falha ao gerar o XLSX."); })
      .finally(function(){ btn.disabled=false; btn.textContent=old; });
  });

  // Boot: tenta o token salvo; se falhar, cai no login.
  if(token){
    validate(token).then(function(){ connect(token); }).catch(function(err){ showLogin(err.message); });
  } else {
    showLogin("");
  }
})();
</script>
</body>
</html>
